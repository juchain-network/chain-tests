name: Nightly Full Regression

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  nightly-full:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 480
    env:
      TEST_ENV_CONFIG: config/test_env.yaml
      CHAIN_ROOT: ${{ vars.CHAIN_ROOT }}
      CHAIN_CONTRACT_ROOT: ${{ vars.CHAIN_CONTRACT_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare config
        shell: bash
        run: |
          cp config/test_env.yaml.example config/test_env.yaml
          if [[ -n "${CHAIN_ROOT}" ]]; then
            sed -i "s#^  chain_root: .*#  chain_root: \"${CHAIN_ROOT}\"#" config/test_env.yaml
          fi
          if [[ -n "${CHAIN_CONTRACT_ROOT}" ]]; then
            sed -i "s#^  chain_contract_root: .*#  chain_contract_root: \"${CHAIN_CONTRACT_ROOT}\"#" config/test_env.yaml
          fi
          sed -i 's/^  backend: .*/  backend: docker/' config/test_env.yaml

      - name: Nightly Full
        shell: bash
        run: |
          make precheck
          make reset
          make ci-nightly-full

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-full-reports
          path: reports/
