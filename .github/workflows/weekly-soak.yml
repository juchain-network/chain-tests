name: Weekly Soak

on:
  schedule:
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  weekly-soak:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 1800
    env:
      TEST_ENV_CONFIG: config/test_env.yaml
      CHAIN_ROOT: ${{ vars.CHAIN_ROOT }}
      RETH_ROOT: ${{ vars.RETH_ROOT }}
      CHAIN_CONTRACT_ROOT: ${{ vars.CHAIN_CONTRACT_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare config
        shell: bash
        run: |
          cp config/test_env.yaml.example config/test_env.yaml
          if [[ -n "${CHAIN_ROOT}" ]]; then
            sed -i "s#^  chain_root: .*#  chain_root: \"${CHAIN_ROOT}\"#" config/test_env.yaml
          fi
          if [[ -n "${CHAIN_CONTRACT_ROOT}" ]]; then
            sed -i "s#^  chain_contract_root: .*#  chain_contract_root: \"${CHAIN_CONTRACT_ROOT}\"#" config/test_env.yaml
          fi
          if [[ -n "${RETH_ROOT}" ]]; then
            sed -i "s#^  reth_root: .*#  reth_root: \"${RETH_ROOT}\"#" config/test_env.yaml
          fi

      - name: Weekly Soak
        shell: bash
        run: |
          make precheck
          make reset
          make ci PROFILE=weekly-soak

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-soak-reports
          path: reports/
