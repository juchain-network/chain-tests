runtime:
  backend: native
  impl_mode: single
  impl: geth

paths:
  chain_root: "../chain"
  reth_root: "../../personal/rchain"
  chain_contract_root: "../chain-contract"
  reth_bytecode_file: "../../../my/rchain/crates/congress-core/src/bytecode.rs"

binaries:
  geth_native: ""
  reth_native: ""

runtime_nodes:
  node0:
    impl: geth
    binary: ""
  node1:
    impl: geth
    binary: ""
  node2:
    impl: geth
    binary: ""
  node3:
    impl: geth
    binary: ""

validator_auth:
  mode: auto
  keystore:
    password_file: ""
    password_env: ""

blacklist:
  enabled: true
  mode: "mock"
  contract_address: "0x1db0EDE439708A923431DC68fd3F646c0A4D4e6E"
  alert_fail_open: true
  mock:
    predeploy: true
    code_file: "./templates/blacklist/mock_runtime_hex.txt"
    abi_file: "./templates/blacklist/mock_abi.json"

network:
  node_count: 4
  validator_count: 3
  epoch: 30
  external_rpc: "http://localhost:18545"
  chain_id: 666666
  data_dir: "./data"
  reports_dir: "./reports"
  bootstrap:
    signer_mode: "separate"
    fee_mode: "validator"
    validator_balance_wei: "1000000000000000000000000000"
    signer_balance_wei: "1000000000000000000"
    fee_balance_wei: "1000000000000000000"
  upgrade_override:
    posa_time: ""
    posa_validators: []
    posa_signers: []

native:
  manager: pm2
  init_script: "./scripts/native/pm2_init.sh"
  ecosystem_file: "./native/ecosystem.config.js"
  env_file: "./data/native/.env"
  network_id: 666666
  external_rpc: "http://localhost:18545"
  pm2_namespace: "ju-chain"
  log_dir: "./data/native-logs"
  ports:
    validator1_http: 18545
    validator1_ws: 18546
    validator1_engine: 18550
    validator1_p2p: 40401
    validator2_http: 18547
    validator2_ws: 18548
    validator2_engine: 18552
    validator2_p2p: 40403
    validator3_http: 18549
    validator3_ws: 18553
    validator3_engine: 18554
    validator3_p2p: 40405
    sync_http: 18551
    sync_ws: 18555
    sync_engine: 18556
    sync_p2p: 40407

tests:
  profile: fast
  timeout: "30m"
  smoke:
    observe_seconds: 300
  reset_before_each_case: true
  epoch_overrides:
    groups:
      default: 30
      staking: 15
      punish: 18
      epoch: 20
    specials:
      punish_double_sign: 18
  profiles:
    fast:
      epoch: 30
      proposal_cooldown: 1
      unbonding_period: 3
      validator_unjail_period: 3
      withdraw_profit_period: 2
      commission_update_cooldown: 1
      proposal_lasting_period: 30
    default:
      epoch: 60
      proposal_cooldown: 1
      unbonding_period: 10
      validator_unjail_period: 10
      withdraw_profit_period: 5
      commission_update_cooldown: 5
      proposal_lasting_period: 100
    edge:
      epoch: 60
      proposal_cooldown: 60
      unbonding_period: 60
      validator_unjail_period: 60
      withdraw_profit_period: 30
      commission_update_cooldown: 30
      proposal_lasting_period: 300

perf:
  tps_tiers: [10, 30, 60]
  sample_interval_seconds: 2
  soak:
    duration: "24h"
    tps: 10
    restart_interval: "1h"
  thresholds:
    success_rate_min: 0.99
    stall_window_seconds_max: 15
    max_height_lag: 8
    rpc_latency_p95_ms_max: 500

ci:
  pr_gate:
    groups: "config,governance,staking,punish,epoch"
    run_smoke: true
  nightly:
    groups: "config,governance,staking,delegation,punish,rewards,epoch"
    run_smoke: true
    run_smoke_matrix: true
    run_fork_all: true
    run_posa: true
    run_reth_keystore_smoke: true
    run_rotation_live: false
    run_add_validator_live: false
    run_add_validator_punish: false
  release_gate:
    run_smoke: true
    run_smoke_matrix: true
    run_fork_all: true
    run_posa: true
  weekly_soak:
    enabled: true
